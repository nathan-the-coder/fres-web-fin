<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — FRES Web Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --accent:#e91e63; --accent2:#7b1fa2; --bg:#0d091e; --border:rgba(255,255,255,0.08); }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Poppins',sans-serif;background:var(--bg);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden;}
        body::before{content:'';position:fixed;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(233,30,99,0.12),transparent 70%);top:-200px;left:-200px;filter:blur(100px);pointer-events:none;}
        body::after{content:'';position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(123,31,162,0.12),transparent 70%);bottom:-150px;right:-150px;filter:blur(100px);pointer-events:none;}

        .card{
            position:relative;z-index:1;
            width:100%;max-width:480px;
            background:rgba(16,8,40,0.95);
            border:1px solid var(--border); border-radius:32px;
            padding:52px 48px;
            box-shadow:0 40px 80px rgba(0,0,0,0.6);
        }
        .back-link{display:inline-flex;align-items:center;gap:8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#4b5563;text-decoration:none;margin-bottom:36px;transition:color 0.2s;}
        .back-link:hover{color:var(--accent);}
        h2{font-size:30px;font-weight:900;font-style:italic;letter-spacing:-1px;margin-bottom:4px;}
        .sub{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:36px;}
        .field{margin-bottom:18px;}
        .field label{display:block;font-size:10px;font-weight:900;color:#4b5563;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px;}
        .field input{
            width:100%;background:rgba(0,0,0,0.45);border:1px solid var(--border);
            border-radius:13px;padding:14px 18px;
            color:white;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;
            outline:none;transition:border 0.2s,box-shadow 0.2s;
        }
        .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(233,30,99,0.15);}
        .field input::placeholder{color:#374151;}
        .hint{font-size:10px;color:#4b5563;font-weight:600;margin-top:5px;}
        .msg{font-size:11px;font-weight:700;min-height:18px;text-align:center;margin:8px 0;border-radius:8px;padding:0 6px;}
        .msg.error{color:#f87171;}
        .msg.success{color:#34d399;}
        .btn{
            width:100%;padding:16px;margin-top:4px;
            background:linear-gradient(135deg,var(--accent),#c2185b);
            border:none;border-radius:14px;
            font-family:'Poppins',sans-serif;font-size:10px;font-weight:900;
            text-transform:uppercase;letter-spacing:2.5px;color:white;
            cursor:pointer;box-shadow:0 8px 24px rgba(233,30,99,0.35);
            transition:all 0.2s;
        }
        .btn:hover:not(:disabled){transform:scale(1.02);}
        .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
        .login-link{text-align:center;font-size:10px;color:#4b5563;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:24px;}
        .login-link a{color:var(--accent);text-decoration:none;}
        .login-link a:hover{text-decoration:underline;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .fa-spin{animation:spin 0.8s linear infinite;}
    </style>
</head>
<body>
    <div class="card">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i>Back to Login</a>
        <h2>Create Account</h2>
        <p class="sub">Northwest Samar State University</p>

        <div class="field">
            <label>Username</label>
            <input type="text" id="regUser" placeholder="Choose a username (min. 3 chars)" autocomplete="username">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="regPass" placeholder="Choose a password (min. 6 chars)" autocomplete="new-password">
            <div class="hint"><i class="fas fa-lock" style="margin-right:4px;"></i>At least 6 characters</div>
        </div>
        <div class="field">
            <label>Confirm Password</label>
            <input type="password" id="regPass2" placeholder="Re-enter your password" autocomplete="new-password">
        </div>

        <p id="regMsg" class="msg"></p>

        <button id="registerBtn" class="btn">
            <i class="fas fa-user-plus" style="margin-right:8px;"></i>Create My Account
        </button>

        <p class="login-link">Already registered? <a href="index.html">Sign In Here</a></p>
    </div>

    <script type="module">
        import { apiRequest } from './core/api.js';

        const showMsg = (text, type = 'error') => {
            const el = document.getElementById('regMsg');
            el.textContent = text;
            el.className = `msg ${type}`;
        };

        document.getElementById('registerBtn')?.addEventListener('click', async () => {
            const username = document.getElementById('regUser').value.trim();
            const password = document.getElementById('regPass').value;
            const confirm  = document.getElementById('regPass2').value;
            const btn      = document.getElementById('registerBtn');

            showMsg('');

            if (!username || !password || !confirm) return showMsg('Please fill in all fields.');
            if (username.length < 3)  return showMsg('Username must be at least 3 characters.');
            if (password.length < 6)  return showMsg('Password must be at least 6 characters.');
            if (password !== confirm)  return showMsg('Passwords do not match.');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Creating Account…';

            try {
                await apiRequest('/users/register', 'POST', { username, password });
                showMsg('Account created! Redirecting to login…', 'success');
                setTimeout(() => window.location.href = 'index.html', 1800);
            } catch (err) {
                showMsg(err.message || 'Registration failed.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus" style="margin-right:8px;"></i>Create My Account';
            }
        });

        ['regUser','regPass','regPass2'].forEach(id => {
            document.getElementById(id)?.addEventListener('keydown', e => {
                if (e.key === 'Enter') document.getElementById('registerBtn').click();
            });
        });
    </script>
</body>
</html>
